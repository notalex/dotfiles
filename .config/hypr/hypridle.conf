general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true bash ~/.local/bin/logical-screen-lock # lock before suspend.
    after_sleep_cmd = sleep 1 && omarchy-system-wake # delay for PAM readiness, then turn on display.
    inhibit_sleep = 2                                      # wait if screen is being locked
    # after_sleep_cmd = sleep 2; bash ~/.local/bin/logical-screen-lock # lock upon wake
}

listener {
    timeout = 150                                             # 2.5min
    on-timeout = pidof hyprlock || omarchy-launch-screensaver # start screensaver (if we haven't locked already)
}

listener {
    timeout = 330                                            # 5.5min
    on-timeout = bash ~/.local/bin/logical-screen-lock
    on-resume = omarchy-system-wake
}
