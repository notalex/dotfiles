name: notes
flags: -u2
hooks:
  post:
    - <%= select_window 3 %>
windows:
  - index: 2
    panes:
      - vim home_work.notes -c 'colorscheme peachpuff'
    hooks:
      pre: cd ~/gitbasket
  - index: 3
    panes: v ~/gitbasket/history.txt -c ':hi ActiveWindow guibg=NONE' -c 'normal! G'
  - index: 7
